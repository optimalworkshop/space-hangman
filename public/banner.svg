<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/>
      <stop offset="100%" style="stop-color:#1e1b4b"/>
    </linearGradient>
    <linearGradient id="title-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#e2e8f0"/>
      <stop offset="100%" style="stop-color:#c4b5fd"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="800" height="200" fill="url(#bg)" rx="8"/>
  <!-- Stars -->
  <circle cx="50" cy="30" r="1" fill="white" opacity="0.8"/>
  <circle cx="120" cy="80" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="200" cy="25" r="1.2" fill="white" opacity="0.7"/>
  <circle cx="300" cy="60" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="380" cy="20" r="1" fill="white" opacity="0.8"/>
  <circle cx="450" cy="90" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="520" cy="35" r="1.1" fill="white" opacity="0.7"/>
  <circle cx="600" cy="70" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="680" cy="25" r="1" fill="white" opacity="0.8"/>
  <circle cx="750" cy="55" r="0.7" fill="white" opacity="0.6"/>
  <circle cx="90" cy="150" r="0.8" fill="white" opacity="0.5"/>
  <circle cx="180" cy="170" r="1" fill="white" opacity="0.7"/>
  <circle cx="350" cy="160" r="0.6" fill="white" opacity="0.6"/>
  <circle cx="500" cy="175" r="0.9" fill="white" opacity="0.5"/>
  <circle cx="620" cy="155" r="1" fill="white" opacity="0.7"/>
  <circle cx="720" cy="170" r="0.8" fill="white" opacity="0.6"/>
  <circle cx="70" cy="110" r="0.6" fill="white" opacity="0.4"/>
  <circle cx="760" cy="120" r="0.7" fill="white" opacity="0.5"/>
  <!-- Astronaut -->
  <g transform="translate(130, 65)">
    <!-- Helmet -->
    <circle cx="0" cy="0" r="20" fill="none" stroke="white" stroke-width="1.5"/>
    <path d="M -10 -5 Q 0 -10 10 -5 Q 10 5 0 5 Q -10 5 -10 -5" fill="#60a5fa" opacity="0.5"/>
    <!-- Body -->
    <rect x="-12" y="20" width="24" height="35" rx="4" fill="none" stroke="white" stroke-width="1.5"/>
    <!-- Arms -->
    <line x1="-12" y1="30" x2="-30" y2="45" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="12" y1="30" x2="30" y2="45" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Legs -->
    <line x1="-6" y1="55" x2="-12" y2="75" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="55" x2="12" y2="75" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <!-- Tether -->
    <path d="M 0 20 Q -30 10 -50 -20 Q -60 -35 -55 -40" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  </g>
  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="42" font-weight="bold" fill="url(#title-grad)">Space Hangman</text>
  <!-- Subtitle -->
  <text x="400" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#94a3b8">Guess the word before your astronaut drifts into the void</text>
  <!-- Tech badges area -->
  <text x="400" y="165" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#7c3aed">React + TypeScript + Tailwind CSS + Vitest</text>
</svg>
